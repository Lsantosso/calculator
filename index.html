<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
<main class="calculadora">
    <header class="display">
        <input type="text" id="visor" value="0">
         
    </header>
    <section class="teclado">
        
        <button class="numero">1</button>
        <button class="numero">2</button>
        <button class="numero">3</button>
        <button class="operador">-</button>
        <button class="numero">4</button>
        <button class="numero">5</button>
        <button class="numero">6</button>
        <button class="operador">+</button>
        <button class="numero">7</button>
        <button class="numero">8</button>
        <button class="numero">9</button>
        <button class="operador">/</button>
        <button class="controle" onclick="limpar()">C</button>
        <button class="numero">0</button>
        <button class="resultado" id="igual">=</button>
        <button class="operador">x</button>
        <button class="delete" onclick="apagar()">Del</button>

    </section>
<script src="funcao.js"></script>
</main>
</body>
</html>
